name: Build (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Build
        run: hatch build

      - name: Install package
        working-directory: dist
        shell: bash
        run: pip install ouestcharlie_whitebeard-*.whl pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
